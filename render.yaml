# Render.com deployment configuration for the Veritas API backend
services:
  - type: web
    name: veritas-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npx --yes pnpm@9 install --no-frozen-lockfile && npx pnpm@9 --filter @workspace/api-server run build
    startCommand: npx pnpm@9 --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: PLATFORM_URL
        sync: false
