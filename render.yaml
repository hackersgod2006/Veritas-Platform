# Render.com deployment configuration for the Veritas API backend
# Deploy at: https://dashboard.render.com → New Web Service → Connect this repo
services:
  - type: web
    name: veritas-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npx --yes pnpm@9 install --frozen-lockfile && npx pnpm@9 --filter @workspace/api-server run build
    startCommand: npx pnpm@9 --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Netlify URL, e.g. https://veritas-platform.netlify.app
      - key: SMTP_HOST
        sync: false          # Optional: e.g. smtp.gmail.com
      - key: SMTP_PORT
        sync: false          # Optional: e.g. 587
      - key: SMTP_USER
        sync: false          # Optional: your SMTP username / email
      - key: SMTP_PASS
        sync: false          # Optional: your SMTP password / app password
      - key: ADMIN_EMAIL
        sync: false          # Optional: email address for admin notifications
      - key: PLATFORM_URL
        sync: false          # Optional: your Netlify URL for email links
