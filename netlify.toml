[build]
  command = "pnpm --filter @workspace/veritas run build"
  publish = "artifacts/veritas/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT = "3000"
  BASE_PATH = "/"

# Return 404 for API routes so frontend auth doesn't treat the HTML
# error page as a valid JSON user response
[[redirects]]
  from = "/api/*"
  to = "/index.html"
  status = 404
  force = true

# SPA fallback — must come AFTER the /api/* rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
