[build]
  command = "pnpm --filter @workspace/veritas run build"
  publish = "artifacts/veritas/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT          = "3000"
  BASE_PATH     = "/"
  # VITE_API_URL — set this in Netlify dashboard after deploying the Render backend
  # Example: https://veritas-api.onrender.com
  VITE_API_URL  = ""

# Block SPA fallback for /api/* routes so a missing backend returns 404,
# not the index HTML (which would confuse auth into thinking the user is logged out)
[[redirects]]
  from   = "/api/*"
  to     = "/index.html"
  status = 404
  force  = true

# SPA fallback — must come AFTER the /api/* rule
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
