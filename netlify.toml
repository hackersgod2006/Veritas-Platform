[build]
  command = "pnpm --filter @workspace/veritas run build"
  publish = "artifacts/veritas/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT          = "3000"
  BASE_PATH     = "/"
  VITE_API_URL  = "https://veritas-platform.onrender.com"

# Block SPA fallback for /api/* routes
[[redirects]]
  from   = "/api/*"
  to     = "/index.html"
  status = 404
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
