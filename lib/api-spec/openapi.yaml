openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Veritas&Co Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: professionals
    description: Professional profiles and verification
  - name: clients
    description: Client operations
  - name: projects
    description: Project management
  - name: applications
    description: Job applications
  - name: messages
    description: In-platform messaging
  - name: waitlist
    description: Waitlist management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH ---
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/set-role:
    post:
      operationId: setRole
      tags: [auth]
      summary: Set user role after first signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInput"
      responses:
        "200":
          description: Role set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # --- PROFESSIONALS ---
  /professionals/me:
    get:
      operationId: getMyProfessionalProfile
      tags: [professionals]
      summary: Get current professional's profile
      responses:
        "200":
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professional"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/passport/{passportId}:
    get:
      operationId: getPassport
      tags: [professionals]
      summary: Get public trust passport by ID
      parameters:
        - name: passportId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trust passport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustPassport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals:
    get:
      operationId: listProfessionals
      tags: [professionals]
      summary: Browse verified professionals (for clients)
      parameters:
        - name: skillsCategory
          in: query
          schema:
            type: string
        - name: tier
          in: query
          schema:
            type: string
        - name: minRate
          in: query
          schema:
            type: integer
        - name: maxRate
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of professionals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalListResponse"

  # --- VERIFICATION ---
  /verification/submit:
    post:
      operationId: submitVerification
      tags: [professionals]
      summary: Submit verification application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professional"

  /verification/my-status:
    get:
      operationId: getMyVerificationStatus
      tags: [professionals]
      summary: Get current verification status and profile
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professional"

  # --- PROJECTS ---
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List open projects
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: preferredTier
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Post a new project (client only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/my:
    get:
      operationId: listMyProjects
      tags: [projects]
      summary: List projects for current client
      responses:
        "200":
          description: My projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project details
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # --- APPLICATIONS ---
  /applications:
    post:
      operationId: applyToProject
      tags: [applications]
      summary: Apply to a project (professional only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/my:
    get:
      operationId: listMyApplications
      tags: [applications]
      summary: List my applications (professional)
      responses:
        "200":
          description: My applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications/for-my-projects:
    get:
      operationId: listApplicationsForMyProjects
      tags: [applications]
      summary: List applications on my projects (client only)
      responses:
        "200":
          description: Applications with professional info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithProfessional"

  /applications/{applicationId}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (client/admin)
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  # --- MESSAGES ---
  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Blocked content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List all conversations for current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"

  /messages/conversation/{userId}:
    get:
      operationId: getConversation
      tags: [messages]
      summary: Get full conversation with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"

  # --- WAITLIST ---
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistInput"
      responses:
        "201":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: Already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # --- ADMIN ---
  /admin/verifications:
    get:
      operationId: listPendingVerifications
      tags: [admin]
      summary: List all pending verifications
      responses:
        "200":
          description: Pending verifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminVerificationItem"

  /admin/verifications/{professionalId}/approve:
    post:
      operationId: approveVerification
      tags: [admin]
      summary: Approve a professional's verification
      parameters:
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/verifications/{professionalId}/reject:
    post:
      operationId: rejectVerification
      tags: [admin]
      summary: Reject a professional's verification
      parameters:
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAllUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: ["string", "null"]
          enum: [professional, client, admin, null]
        country:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        createdAt:
          type: string
      required: [id, email, name, isAdmin, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RegisterInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
      required: [email, password, name]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    RoleInput:
      type: object
      properties:
        role:
          type: string
          enum: [professional, client]
      required: [role]

    Professional:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        bio:
          type: ["string", "null"]
        skillsCategory:
          type: ["string", "null"]
        proficiencyLevel:
          type: ["string", "null"]
        portfolioLinks:
          type: array
          items:
            type: string
        workHistory:
          type: ["string", "null"]
        verificationStatus:
          type: string
          enum: [pending, verified, rejected, not_submitted]
        trustScore:
          type: ["integer", "null"]
        tier:
          type: ["string", "null"]
        projectsCompleted:
          type: integer
        deliveryRate:
          type: ["number", "null"]
        clientSatisfaction:
          type: ["number", "null"]
        passportId:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        name:
          type: string
        email:
          type: string
      required: [id, userId, verificationStatus, projectsCompleted, name, email]

    TrustPassport:
      type: object
      properties:
        passportId:
          type: string
        displayName:
          type: string
        userId:
          type: integer
        country:
          type: ["string", "null"]
        trustScore:
          type: ["integer", "null"]
        tier:
          type: ["string", "null"]
        skillsCategory:
          type: ["string", "null"]
        projectsCompleted:
          type: integer
        deliveryRate:
          type: ["number", "null"]
        clientSatisfaction:
          type: ["number", "null"]
        identityVerified:
          type: boolean
        skillsAssessed:
          type: boolean
        backgroundCleared:
          type: boolean
        integrityConfirmed:
          type: boolean
      required: [passportId, displayName, projectsCompleted, identityVerified, skillsAssessed, backgroundCleared, integrityConfirmed]

    ProfessionalListResponse:
      type: object
      properties:
        professionals:
          type: array
          items:
            $ref: "#/components/schemas/Professional"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [professionals, total, page, limit]

    VerificationInput:
      type: object
      properties:
        bio:
          type: string
        country:
          type: string
        skillsCategory:
          type: string
        proficiencyLevel:
          type: string
        portfolioLinks:
          type: array
          items:
            type: string
        workHistory:
          type: string
      required: [bio, country, skillsCategory, proficiencyLevel, workHistory]

    Project:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        title:
          type: string
        description:
          type: string
        skillsRequired:
          type: array
          items:
            type: string
        duration:
          type: string
        budgetMin:
          type: integer
        budgetMax:
          type: integer
        preferredTier:
          type: string
        status:
          type: string
          enum: [open, matched, active, completed]
        createdAt:
          type: string
      required: [id, clientId, title, description, duration, budgetMin, budgetMax, preferredTier, status, createdAt]

    ProjectInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        skillsRequired:
          type: array
          items:
            type: string
        duration:
          type: string
        budgetMin:
          type: integer
        budgetMax:
          type: integer
        preferredTier:
          type: string
      required: [title, description, duration, budgetMin, budgetMax, preferredTier]

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        page:
          type: integer
      required: [projects, total, page]

    Application:
      type: object
      properties:
        id:
          type: integer
        professionalId:
          type: integer
        projectId:
          type: integer
        status:
          type: string
          enum: [pending, shortlisted, accepted, rejected]
        createdAt:
          type: string
      required: [id, professionalId, projectId, status, createdAt]

    ApplicationWithProfessional:
      type: object
      properties:
        id:
          type: integer
        professionalId:
          type: integer
        projectId:
          type: integer
        status:
          type: string
          enum: [pending, shortlisted, accepted, rejected]
        createdAt:
          type: string
        professionalName:
          type: string
        professionalUserId:
          type: integer
        skillsCategory:
          type: ["string", "null"]
        trustScore:
          type: ["integer", "null"]
        tier:
          type: ["string", "null"]
        passportId:
          type: ["string", "null"]
        projectTitle:
          type: string
      required: [id, professionalId, projectId, status, createdAt, professionalName, professionalUserId, projectTitle]

    ApplicationInput:
      type: object
      properties:
        projectId:
          type: integer
      required: [projectId]

    ApplicationStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, shortlisted, accepted, rejected]
      required: [status]

    Message:
      type: object
      properties:
        id:
          type: integer
        senderId:
          type: integer
        receiverId:
          type: integer
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, senderId, receiverId, content, isRead, createdAt]

    SendMessageInput:
      type: object
      properties:
        receiverId:
          type: integer
        content:
          type: string
      required: [receiverId, content]

    ConversationSummary:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
        unreadCount:
          type: integer
      required: [userId, name, lastMessage, lastMessageAt, unreadCount]

    ConversationResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        otherUser:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required: [id, name]
      required: [messages, otherUser]

    WaitlistInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    AdminVerificationItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        country:
          type: ["string", "null"]
        skillsCategory:
          type: ["string", "null"]
        proficiencyLevel:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        workHistory:
          type: ["string", "null"]
        portfolioLinks:
          type: array
          items:
            type: string
        verificationStatus:
          type: string
        createdAt:
          type: string
      required: [id, userId, name, email, verificationStatus, createdAt]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalProfessionals:
          type: integer
        totalClients:
          type: integer
        totalProjects:
          type: integer
        pendingVerifications:
          type: integer
        verifiedProfessionals:
          type: integer
        waitlistCount:
          type: integer
      required: [totalUsers, totalProfessionals, totalClients, totalProjects, pendingVerifications, verifiedProfessionals, waitlistCount]

    RejectInput:
      type: object
      properties:
        reason:
          type: string
      required: [reason]
